<template>
    <div class="slds-var-p-horizontal_x-large slds-var-p-vertical_small slds-var-m-vertical_x-small tileDisplay">
        <lightning-icon icon-name={iconName} size="small"></lightning-icon>
        &nbsp;&nbsp;
        <slot name="tileContents"></slot>
        <br/>
   
        <div class="slds-grid slds-wrap slds-var-m-top_medium">
            <ul lwc:if={pills} class="slds-list_horizontal slds-has-dividers_left">
                <template for:each={pills} for:item="pill">
                    <li key={pill.id} class="slds-item">
                        {pill.name}
                    </li>
                </template>
            </ul>
        </div>
    </div>
    <br/>
</template>
