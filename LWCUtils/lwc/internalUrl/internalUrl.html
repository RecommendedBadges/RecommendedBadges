<!--
  @description       : Custom data type for displaying hyperlinked values for certain rows based on ID key prefix and whether the component is surfaced on an Experience site.
  @author            : Ben Learn
  @last modified by  : Ben Learn
-->
<template>
    <c-error></c-error>
    <div lwc:if={renderUrl}>
        <lightning-formatted-url label={label} value={url}></lightning-formatted-url>
    </div>
    <div lwc:else>
        <lightning-formatted-text value={label}></lightning-formatted-text>
    </div>
</template>
